query Me {
  me {
    id
    email
    name
    phone
    imageUrl
    role
    employeeId
    companyId
    rating
    rideCount
    company {
      id
      name
    }
    vehicles {
      id
      userId
      model
      color
      plate
      capacity
      createdAt
    }
  }
}

query MyVehicles {
  myVehicles {
    id
    userId
    model
    color
    plate
    capacity
    createdAt
  }
}

mutation JoinWithInviteCode($input: JoinWithInviteCodeInput!) {
  joinWithInviteCode(input: $input) {
    accessToken
    refreshToken
    user {
      id
      email
      name
      phone
      imageUrl
      role
      employeeId
      companyId
      rating
      rideCount
    }
  }
}

mutation Login($input: LoginInput!) {
  login(input: $input) {
    accessToken
    refreshToken
    user {
      id
      email
      name
      phone
      imageUrl
      role
      employeeId
      companyId
      rating
      rideCount
    }
  }
}

mutation UpdateProfile($input: UpdateProfileInput!) {
  updateProfile(input: $input) {
    id
    email
    name
    phone
    imageUrl
    role
    employeeId
    companyId
    rating
    rideCount
    company {
      id
      name
    }
    vehicles {
      id
      userId
      model
      color
      plate
      capacity
      createdAt
    }
  }
}

mutation RegisterVehicle($input: RegisterVehicleInput!) {
  registerVehicle(input: $input) {
    id
    userId
    model
    color
    plate
    capacity
    createdAt
  }
}

mutation UpdateVehicle($id: ID!, $input: UpdateVehicleInput!) {
  updateVehicle(id: $id, input: $input) {
    id
    userId
    model
    color
    plate
    capacity
    createdAt
  }
}

mutation DeleteVehicle($id: ID!) {
  deleteVehicle(id: $id)
}
